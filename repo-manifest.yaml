repo:
  name: akasha-discovery
  ecosystem: akasha
  version: 0.1.0
  status: active

engine:
  family: discovery
  class: discovery_engine
  role: candidate_structure_generation

identity:
  role: engine
  layer: discovery
  description: >
    Discovery engine for the Akasha constellation.
    Responsible for proposing new structures, candidate links, missing pieces,
    and possible knowledge formations based on existing graph and ontology layers.

ownership:
  steward: human
  approval_required: true

interfaces:
  consumes:
    - ontology_models
    - graph_phase_models
    - source_payloads
    - event_ledgers
  produces:
    - discovery_candidates
    - structure_proposals
    - gap_hypotheses
    - exploratory_outputs

capabilities:
  - candidate_generation
  - exploratory_structure_detection
  - gap_hypothesis_creation
  - cross_domain_discovery

alignment:
  axioms_required: true
  canonical_structure: true
  interpretation_free_core: true

depends_on:
  - akasha-ontology
  - akasha-graph-phases
