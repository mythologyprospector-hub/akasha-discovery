nodes:

  phase:
    description: stable configuration of a system

  transition:
    description: change between system states

  equilibrium:
    description: balanced system state

  instability:
    description: condition where small changes produce large effects

  constraint:
    description: limiting factor influencing system behavior

  attractor:
    description: state toward which a system tends to evolve


edges:

  transitions_to:
    from: phase
    to: transition

  transitions_to_instability:
    from: transition
    to: instability

  constrained_by:
    from: phase
    to: constraint

  stabilizes:
    from: constraint
    to: equilibrium

  destabilizes:
    from: constraint
    to: transition

  emerges_from:
    from: transition
    to: phase

  settles_into:
    from: equilibrium
    to: phase

  triggers:
    from: instability
    to: transition

  tends_toward:
    from: phase
    to: attractor
